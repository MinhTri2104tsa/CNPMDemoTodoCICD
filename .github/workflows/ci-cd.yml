name: Advanced Todo List CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20.x"
  APP_NAME: Advanced Todo List
  DEPLOY_ENV: staging

# Hủy run cũ nếu có run mới trên cùng nhánh
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================
  # TEST + SECURITY (chạy song song)
  # ==========================================
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Bỏ 16.x (đã EOL), giữ 18.x và 20.x
        node-version: [18.x, 20.x]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm run test:unix
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: |
            test-results/
            *.log
          retention-days: 7

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    # Chạy SONG SONG với test, không cần đợi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Audit (moderate+)
        run: npm audit --audit-level moderate
        continue-on-error: true

      - name: Fail on high severity
        run: npm audit --audit-level high

  # ==========================================
  # BUILD — chờ cả test lẫn security
  # ==========================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Collect artifacts
        run: |
          mkdir -p dist
          for f in public src/server.js src/version.js src/config.js; do
            [ -e "$f" ] && cp -r "$f" dist/ || true
          done
          cp package*.json dist/

      - uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
          retention-days: 30

  # ==========================================
  # DEPLOY — chỉ từ nhánh main
  # ==========================================
  deploy:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: deploy/

      - name: Simulate deploy
        run: |
          echo "Deploying ${{ env.APP_NAME }} to staging..."
          echo "Commit: ${{ github.sha }}"
          echo "Files:"
          ls -la deploy/
          echo "Deploy simulation completed."

      - name: Health check
        run: |
          echo "Health check passed"
          # curl --fail https://todo-app-${{ env.DEPLOY_ENV }}.example.com/health

  # ==========================================
  # NOTIFY — luôn chạy, tóm tắt toàn bộ
  # ==========================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [test, security, build, deploy]
    if: always()
    steps:
      - name: Pipeline summary
        run: |
          cat <<'EOF' >> $GITHUB_STEP_SUMMARY
          ## CI/CD Summary — ${{ env.APP_NAME }}

          | Job       | Status |
          |-----------|--------|
          | Test      | ${{ needs.test.result }} |
          | Security  | ${{ needs.security.result }} |
          | Build     | ${{ needs.build.result }} |
          | Deploy    | ${{ needs.deploy.result }} |

          **Branch:** `${{ github.ref_name }}` · **Commit:** `${{ github.sha }}` · **By:** @${{ github.actor }}
          EOF

      # Placeholder: thay bằng Discord/Slack webhook thật nếu cần
      - name: Discord notification (placeholder)
        if: always()
        run: echo "Send webhook here — status=${{ job.status }}"
